version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kamikonn_db_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kamikonn}
      POSTGRES_USER: ${POSTGRES_USER:-kamikonn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kamikonn_password}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kamikonn_user} -d ${POSTGRES_DB:-kamikonn}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kamikonn_redis_prod
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: kamikonn_backend_prod
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run gunicorn kamikonn.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: kamikonn_celery_prod
    command: uv run celery -A kamikonn worker -l info
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: kamikonn_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - backend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: kamikonn_certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data_prod:
