version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kamikonn_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kamikonn}
      POSTGRES_USER: ${POSTGRES_USER:-kamikonn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kamikonn_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kamikonn_user} -d ${POSTGRES_DB:-kamikonn}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kamikonn_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kamikonn_backend
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kamikonn_celery
    command: uv run celery -A kamikonn worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kamikonn_frontend
    command: pnpm dev --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api/v1}

volumes:
  postgres_data:
