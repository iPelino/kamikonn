name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras --frozen

      - name: Run Ruff linter
        working-directory: backend
        run: uv run ruff check .

      - name: Run Ruff formatter check
        working-directory: backend
        run: uv run ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kamikonn_test
          POSTGRES_USER: kamikonn_user
          POSTGRES_PASSWORD: kamikonn_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: kamikonn_test
      POSTGRES_USER: kamikonn_user
      POSTGRES_PASSWORD: kamikonn_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: ci-secret-key-not-for-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras --frozen

      - name: Run migrations
        working-directory: backend
        run: uv run python manage.py migrate --no-input

      - name: Run tests with coverage
        working-directory: backend
        run: uv run pytest --cov=. --cov-report=xml --cov-fail-under=70

      - name: Upload coverage report
        uses: codecov/codecov-action@v7
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
